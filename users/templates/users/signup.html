{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멋사대학교 회원가입</title>
    <link rel="stylesheet" href="{% static 'css/reviewSignup.css' %}" />
</head>
<body>
    <div class="signup-container">
        <h2>멋사대학교 회원가입</h2>
        <div class="announcement">
            <p>멋사대학교 계정으로 <span class="emphasize">시험 후기 게시판</span>을<span></span></p>
            <p>포함한 다양한 대학생 서비스를 모두 이용하실 수 있습니다.</p>
        </div>


        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form class="signup-form" method="post" action="{% url 'users:signup' %}">
            {% csrf_token %}
            <div class="each-input">
                <label for="username">아이디</label>
                <input type="text" id="username" class="input-box" placeholder="아이디를 입력하세요." name="username">
            </div>
            <div class="each-input">
                <label for="name">본명</label>
                <input type="text" id="name" class="input-box" placeholder="본명을 입력하세요." name="name">
            </div>
            <div class="each-input">
                <label for="password">비밀번호</label>
                <input type="password" id="password" class="input-box" placeholder="최소 8자 이상" name="password">
            </div>
            <div class="each-input">
                <label for="confirm-password">비밀번호 재입력</label>
                <input type="password" id="confirm-password" class="input-box" placeholder="비밀번호를 재입력하세요." name="password_confirm">
            </div>
            <div class="each-input">
                <label for="grade">학년</label>
                <select id="grade" class="input-box" name="grade" style="appearance: auto;">
                    <option value="1">1 학년</option>
                    <option value="2">2 학년</option>
                    <option value="3">3 학년</option>
                    <option value="4">4 학년</option>
                </select>
            </div>
            <input type="submit" id="signup-btn" class="submit-btn" value="회원가입">
        </form>
    </div>
    
    <script src="{% static 'js/reviewSignup.js' %}"></script>
</body>
</html>

{% comment %}
